<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" routerLink="/home">
      Kpi Jira<span class="text-warning ms-1">Delivery</span>
    </a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
      aria-controls="navbarNav"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/home"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            <i class="bi bi-house-door"></i>
            Home
          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/monthly-tracking"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            <i class="bi bi-calendar-month"></i>
            Monthly Tracking & Targets
          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/daily-summary"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            <i class="bi bi-calendar-day"></i>
            Daily Summary
          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/role-summary"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            <i class="bi bi-people"></i>
            Role Summary
          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/author-summary"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            <i class="bi bi-person-badge"></i>
            Author Summary
          </a>
        </li>
      </ul>

      <div class="d-flex align-items-center gap-2">

        <button
          *ngIf="!isAuthenticated"
          class="btn btn-primary"
          type="button"
          (click)="login()"
        >
          <i class="bi bi-box-arrow-in-right me-1"></i>
          Connexion
        </button>

        <div ngbDropdown class="ms-2" *ngIf="isAuthenticated">
          <button
            class="btn btn-action text-light dropdown-toggle d-flex align-items-center"
            id="userDropdown"
            ngbDropdownToggle
            type="button"
          >
            <span class="me-2">
              <div
                class="avatar-sm bg-warning bg-opacity-10 text-warning rounded-circle d-flex align-items-center justify-content-center me-1"
              >
                {{ getUserInitials() }}
              </div>
            </span>

            <div class="d-flex flex-column text-start me-2">
              <span class="small fw-semibold">{{ userName }}</span>
              <span class="x-small text-light opacity-75">
                {{ isAdmin ? 'Administrator' : (getRoleDisplayText() || 'User') }}
              </span>
            </div>
          </button>

          <ul
            ngbDropdownMenu
            aria-labelledby="userDropdown"
            class="dropdown-menu-end dropdown-menu-dark"
          >
            <li class="dropdown-header">
              <div class="d-flex align-items-center">
                <div class="me-2">
                  <i class="bi bi-person-circle fs-4"></i>
                </div>
                <div>
                  <div class="fw-semibold">{{ userName }}</div>
                  <small class="text-light opacity-75">
                    {{ isAdmin ? 'Administrator' : (getRoleDisplayText() || 'User') }}
                  </small>
                </div>
              </div>
            </li>

            <li><hr class="dropdown-divider" /></li>

            <li>
              <button
                ngbDropdownItem
                type="button"
                class="d-flex align-items-center text-danger"
                (click)="logout()"
              >
                <i class="bi bi-box-arrow-right me-2"></i>
                <span>Logout</span>
              </button>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</nav>
